<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Pokemon</title>
    <link rel="stylesheet" href="styles.css">
     <link rel="stylesheet" type="media/x-icon" href="images/charizard.png">
</head>
<body>
    <main class="container">
        <article class="card">
            <div class="header">
                <img src="./images/fondoencabezado.svg" alt="header image" class="header-img">
            </div>

            <div class="body-content">
                <img alt="charizard" src="./images/charizard.png">
                <div class="content-detail">
                    <h1>charizard</h1>
                    <span>#26</span>
                </div>
                <span>colleccionable</span>
             </div>
             <div class="footer">
             <div class="details">
                <h3>Poder</h3>
                <img alt="poder" src="./images/fuego.png">
             </div>
             <div class="details">
                <h3>Resistencia</h3>
                <img alt="resistencia" src="./images/castillo.png">
             </div>
             <div class="details">
                <h3>Bonus</h3>
                <img alt="bonus" src="./images/cofre.png">
             </div>
            
            </div>
        </article>
    </main>
</body>
</html>
